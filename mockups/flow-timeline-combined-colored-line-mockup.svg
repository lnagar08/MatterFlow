<svg width="2048" height="620" viewBox="0 0 2048 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="2048" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EEF3FC"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="2048" height="620" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="segIn" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#20B173"/>
      <stop offset="1" stop-color="#2AC987"/>
    </linearGradient>
    <linearGradient id="segRisk" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#E7A80F"/>
      <stop offset="1" stop-color="#F6C44F"/>
    </linearGradient>
    <linearGradient id="segOut" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#E65A5A"/>
      <stop offset="1" stop-color="#F07A7A"/>
    </linearGradient>
  </defs>

  <rect width="2048" height="620" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="64" y="50" width="1920" height="510" rx="30" fill="#FFFFFF" fill-opacity="0.92" stroke="#D8E3F6"/>
