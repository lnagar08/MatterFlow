  <circle cx="1090" cy="232" r="33" fill="#FFECEF" stroke="#EA6A7B" stroke-width="4"/>
  <text x="1077" y="246" fill="#C5324D" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="900">!</text>

  <circle cx="1540" cy="232" r="33" fill="#EEF3FB" stroke="#93A7C6" stroke-width="4"/>
  <circle cx="1860" cy="232" r="33" fill="#EEF3FB" stroke="#93A7C6" stroke-width="4"/>

