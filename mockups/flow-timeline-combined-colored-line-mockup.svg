  <line x1="150" y1="232" x2="1860" y2="232" stroke="#C9D5E8" stroke-width="14" stroke-linecap="round"/>

  <!-- color segments reflecting state by stage -->
  <!-- Intake = In Flow/Completed -->
  <line x1="150" y1="232" x2="600" y2="232" stroke="url(#segIn)" stroke-width="14" stroke-linecap="round"/>
  <!-- PPM/Document Drafting = At Flow Risk -->
  <line x1="600" y1="232" x2="1090" y2="232" stroke="url(#segRisk)" stroke-width="14" stroke-linecap="round"/>
  <!-- SEC/Blue Sky = Out of Flow -->
  <line x1="1090" y1="232" x2="1540" y2="232" stroke="url(#segOut)" stroke-width="14" stroke-linecap="round"/>
  <!-- Closing = Not entered yet -->
  <line x1="1540" y1="232" x2="1860" y2="232" stroke="#B7C5DD" stroke-width="14" stroke-linecap="round"/>

  <!-- nodes -->
