<svg width="1800" height="780" viewBox="0 0 1800 780" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1800" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FAFF"/>
      <stop offset="1" stop-color="#EEF3FD"/>
    </linearGradient>
    <filter id="soft" x="0" y="0" width="1800" height="780" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="riskBar" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#F4B323"/>
      <stop offset="1" stop-color="#F6C95F"/>
    </linearGradient>
    <linearGradient id="outBar" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#E95858"/>
      <stop offset="1" stop-color="#F27A7A"/>
    </linearGradient>
    <linearGradient id="inBar" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#22B573"/>
      <stop offset="1" stop-color="#30C989"/>
    </linearGradient>
  </defs>

  <rect width="1800" height="780" fill="url(#bg)"/>

  <g filter="url(#soft)">
    <rect x="70" y="46" width="1660" height="688" rx="24" fill="#FFFFFF" fill-opacity="0.92" stroke="#D7E2F4"/>
  </g>

  <text x="120" y="112" fill="#152645" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800">Flow Timeline</text>
  <text x="120" y="154" fill="#526A90" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="600">DVR Trust PPM · stage-by-stage progress overview</text>

  <!-- legend -->
  <text x="120" y="208" fill="#35507A" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700">Flow line color key:</text>
  <rect x="450" y="181" width="20" height="20" rx="6" fill="#22B573"/>
  <text x="480" y="198" fill="#48628C" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700">In Flow</text>
  <rect x="650" y="181" width="20" height="20" rx="6" fill="#F4B323"/>
  <text x="680" y="198" fill="#48628C" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700">At Flow Risk</text>
  <rect x="930" y="181" width="20" height="20" rx="6" fill="#E95858"/>
  <text x="960" y="198" fill="#48628C" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700">Out of Flow</text>
  <rect x="1220" y="181" width="20" height="20" rx="6" fill="#B8C5DA"/>
  <text x="1250" y="198" fill="#48628C" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700">Not applicable yet</text>

  <!-- full timeline backbone -->
  <line x1="180" y1="292" x2="1620" y2="292" stroke="#C8D4E7" stroke-width="14" stroke-linecap="round"/>

  <!-- completed stage segment (Intake) -->
  <line x1="180" y1="292" x2="640" y2="292" stroke="url(#inBar)" stroke-width="14" stroke-linecap="round"/>

  <!-- current stage segment (PPM/Document Drafting) - mostly filled, risk color near limit -->
  <line x1="640" y1="292" x2="980" y2="292" stroke="url(#riskBar)" stroke-width="14" stroke-linecap="round"/>
  <line x1="980" y1="292" x2="1120" y2="292" stroke="#D8E2F2" stroke-width="14" stroke-linecap="round"/>

  <!-- future segments -->
  <line x1="1120" y1="292" x2="1400" y2="292" stroke="#BECBE0" stroke-width="14" stroke-linecap="round"/>
  <line x1="1400" y1="292" x2="1620" y2="292" stroke="#BECBE0" stroke-width="14" stroke-linecap="round"/>

  <!-- nodes -->
  <circle cx="180" cy="292" r="31" fill="#E5F9EF" stroke="#22B573" stroke-width="4"/>
  <text x="168" y="304" fill="#138F5A" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="900">✓</text>

  <circle cx="640" cy="292" r="31" fill="#FFF5E3" stroke="#F4B323" stroke-width="4"/>
  <text x="629" y="304" fill="#C57F00" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="900">⚠</text>

  <circle cx="1120" cy="292" r="31" fill="#EEF3FC" stroke="#9FB0CA" stroke-width="4"/>
  <circle cx="1400" cy="292" r="31" fill="#EEF3FC" stroke="#9FB0CA" stroke-width="4"/>

  <!-- stage detail cards -->
  <rect x="120" y="350" width="500" height="320" rx="20" fill="#F3FBF7" stroke="#BFE8D2"/>
  <text x="154" y="412" fill="#0E734A" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800">Intake</text>
  <text x="484" y="412" fill="#0E734A" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="700">Completed</text>
  <rect x="154" y="435" width="430" height="12" rx="6" fill="#D7E2F0"/>
  <rect x="154" y="435" width="430" height="12" rx="6" fill="url(#inBar)"/>
  <text x="154" y="492" fill="#3D6E5B" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="700">3/3 Flow Steps complete</text>
  <text x="154" y="542" fill="#577D6C" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="600">Completed on Feb 20, 2026</text>
  <text x="154" y="590" fill="#577D6C" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="600">Expected: 5d</text>

  <rect x="650" y="350" width="560" height="320" rx="20" fill="#FFFAF2" stroke="#F4C171"/>
  <text x="684" y="412" fill="#A36400" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800">PPM/Document Drafting</text>
  <text x="1035" y="412" fill="#B56B00" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="700">At Flow Risk</text>
  <rect x="684" y="435" width="490" height="12" rx="6" fill="#D7E2F0"/>
  <rect x="684" y="435" width="430" height="12" rx="6" fill="url(#riskBar)"/>
  <text x="684" y="492" fill="#7A5A2A" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="700">1/4 Flow Steps complete</text>
  <text x="684" y="542" fill="#8A6733" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="600">13 days in stage</text>
  <text x="684" y="590" fill="#8A6733" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="600">2d left (30d expected + 2d grace)</text>

  <rect x="1240" y="350" width="440" height="320" rx="20" fill="#F7FAFF" stroke="#CCD9EE"/>
  <text x="1272" y="412" fill="#2D4871" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800">SEC/Blue Sky Filings</text>
  <text x="1272" y="492" fill="#667EA5" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="700">0/8 Flow Steps complete</text>
  <text x="1272" y="542" fill="#7088AD" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="600">Expected: 5d</text>
  <text x="1272" y="590" fill="#7088AD" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="600">Not entered yet</text>

  <!-- optional collapsed next stage chip -->
  <rect x="1240" y="690" width="440" height="48" rx="24" fill="#F0F5FE" stroke="#D1DDF0"/>
  <text x="1266" y="722" fill="#6C83A8" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="600">Closing stage appears here when present</text>
</svg>
