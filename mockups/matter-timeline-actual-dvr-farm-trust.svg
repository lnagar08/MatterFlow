  <text x="1190" y="548" fill="#7086AA" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500">0/8 steps complete</text>
  <text x="1190" y="582" fill="#7086AA" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500">Expected: 5d</text>

