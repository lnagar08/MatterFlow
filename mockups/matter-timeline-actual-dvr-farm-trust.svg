  <text x="210" y="369" fill="#108A52" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="900">✓</text>

  <circle cx="730" cy="360" r="26" fill="#E9F8EF" stroke="#21B26F" stroke-width="3"/>
  <circle cx="1230" cy="360" r="26" fill="#EEF3FB" stroke="#9FB0CA" stroke-width="3"/>
  <circle cx="1570" cy="360" r="26" fill="#EEF3FB" stroke="#9FB0CA" stroke-width="3"/>

