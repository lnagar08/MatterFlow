  <text x="590" y="470" fill="#0E7046" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800">PPM/Document Drafting</text>
  <text x="590" y="512" fill="#2C7B58" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="600">In Flow</text>
  <text x="590" y="548" fill="#4E7B67" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500">Elapsed: ~13d of 30d expected</text>
  <text x="590" y="582" fill="#4E7B67" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500">1/4 steps complete</text>

