  <rect x="130" y="420" width="330" height="190" rx="18" fill="#F4FCF8" stroke="#BFEBD3"/>
  <text x="160" y="470" fill="#0E7046" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800">Intake</text>
  <text x="160" y="512" fill="#2C7B58" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="600">Completed</text>
  <text x="160" y="548" fill="#4E7B67" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500">3/3 steps complete</text>
