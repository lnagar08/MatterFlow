  <text x="456" y="300" fill="#4E658A" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600">In Flow</text>
  <rect x="560" y="285" width="18" height="18" rx="5" fill="#F2B11C"/>
  <text x="586" y="300" fill="#4E658A" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600">At Flow Risk</text>
  <rect x="740" y="285" width="18" height="18" rx="5" fill="#EA5A5A"/>
  <text x="766" y="300" fill="#4E658A" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600">Out of Flow</text>
  <rect x="910" y="285" width="18" height="18" rx="5" fill="#B8C5DB"/>
