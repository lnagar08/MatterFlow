  <text x="1270" y="198" fill="#60779C" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600">Current Stage: PPM/Document Drafting</text>

  <!-- backbone -->
  <line x1="220" y1="360" x2="1570" y2="360" stroke="#D2DBEB" stroke-width="14" stroke-linecap="round"/>

  <!-- segments -->
  <line x1="220" y1="360" x2="730" y2="360" stroke="#21B26F" stroke-width="14" stroke-linecap="round"/>
  <line x1="730" y1="360" x2="1230" y2="360" stroke="#21B26F" stroke-width="14" stroke-linecap="round"/>
  <line x1="1230" y1="360" x2="1570" y2="360" stroke="#B8C5DB" stroke-width="14" stroke-linecap="round"/>

  <!-- nodes -->
