<svg width="1800" height="760" viewBox="0 0 1800 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1800" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#F7FAFF" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1800" height="760" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1800" height="760" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="80" y="60" width="1640" height="620" rx="26" fill="url(#card)" stroke="#D8E4F8"/>
  </g>

  <text x="130" y="130" fill="#0F1C39" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800">Flow Timeline</text>
  <text x="130" y="176" fill="#4A5F84" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="600">DVR Trust PPM</text>
  <text x="130" y="212" fill="#6B7FA3" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="500">Client: DVR FARM TRUST</text>

  <rect x="1240" y="118" width="430" height="112" rx="18" fill="#F5F9FF" stroke="#D5E2F8"/>
